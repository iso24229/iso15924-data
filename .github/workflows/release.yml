name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Trusted publishing via OIDC. Requires the npm package to be configured
# with this workflow as a trusted publisher on npmjs.com (repo:
# iso24229/iso15924-data, workflow file: release.yml). No NPM_TOKEN
# secret is used.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Validate before publish
        run: node scripts/validate.mjs

      - name: Publish
        run: npm publish --provenance --access public
