name: Sync

on:
  schedule:
    # Sundays 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - run: pnpm install --frozen-lockfile=false

      - id: sync
        run: pnpm sync

      - name: Commit changes + tag release on data changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u +%Y%m%d)

          # Data dirs changed -> cut a release.
          if ! git diff --cached --quiet -- codes manifest.yaml; then
            RAW=$(npm version patch --no-git-tag-version)
            NEW_VERSION="${RAW#v}"
            git add package.json
            git commit -m "chore(data): sync ISO 15924 ($DATE)

            Source: https://www.unicode.org/iso15924/iso15924.txt.gz

            Release v$NEW_VERSION."
            git tag "v$NEW_VERSION"
            git push origin HEAD --tags
            echo "Released v$NEW_VERSION"
          else
            git commit -m "chore(heartbeat): weekly sync check ($DATE)

            No upstream changes this cycle."
            git push origin HEAD
          fi
